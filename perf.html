<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>getBoxQuads Performance Fixture</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Georgia", "Times New Roman", serif;
            --page-background: linear-gradient(180deg, #f5f0e4 0%, #e7dcc7 100%);
            --panel-background: rgba(255, 250, 240, 0.78);
            --panel-border: rgba(84, 59, 34, 0.18);
            --ink: #2f2316;
            --accent: #8b5f2c;
            --target-a: #efe2b4;
            --target-b: #f6d79c;
            --target-border: rgba(90, 60, 20, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--page-background);
            color: var(--ink);
        }

        #page {
            padding: 40px 48px 72px;
        }

        .intro {
            max-width: 960px;
            margin-bottom: 28px;
        }

        .intro h1 {
            margin: 0 0 8px;
            font-size: 34px;
            line-height: 1.1;
            letter-spacing: 0.02em;
        }

        .intro p {
            margin: 0;
            max-width: 720px;
            font-size: 15px;
            line-height: 1.5;
        }

        #benchmark-anchor {
            position: relative;
            transform: translate(36px, 20px) rotate(-1.25deg) scale(1.01);
            transform-origin: top left;
        }

        #scene {
            display: grid;
            grid-template-columns: repeat(4, minmax(320px, 1fr));
            gap: 22px;
            width: 1500px;
            padding: 14px;
        }

        .cluster {
            position: relative;
            min-height: 320px;
            padding: 14px;
            border: 1px solid var(--panel-border);
            border-radius: 22px;
            background: var(--panel-background);
            box-shadow: 0 18px 36px rgba(56, 42, 23, 0.08);
            overflow: hidden;
        }

        .cluster::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 18px;
            border: 1px dashed rgba(110, 83, 48, 0.14);
            pointer-events: none;
        }

        .cluster-heading {
            margin: 0 0 12px;
            font-size: 14px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(54, 37, 17, 0.72);
        }

        .layer {
            position: relative;
            transform-origin: center;
        }

        .stack {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 10px 9px;
            padding: 8px 6px 6px;
        }

        .tile {
            position: relative;
            width: 82px;
            height: 72px;
            transform-origin: center;
        }

        .tile-frame {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
        }

        .target {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 74px;
            min-height: 58px;
            padding: 8px 9px;
            border: 1px solid var(--target-border);
            border-radius: 14px;
            background: linear-gradient(180deg, var(--target-a) 0%, var(--target-b) 100%);
            text-align: center;
            line-height: 1.08;
            box-shadow: 0 10px 18px rgba(78, 54, 18, 0.12);
            transform-origin: center;
        }

        .target-label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.02em;
            transform-origin: center;
        }

        .target-badge {
            position: absolute;
            top: -6px;
            right: -5px;
            min-width: 18px;
            padding: 1px 4px;
            border-radius: 999px;
            background: rgba(74, 47, 18, 0.88);
            color: #fff8ef;
            font-size: 9px;
            line-height: 1.2;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="page">
        <section class="intro">
            <h1>getBoxQuads Performance Fixture</h1>
            <p>This page renders a large, transformed scene so Playwright can benchmark the polyfill against real browser layout work.</p>
        </section>
        <div id="benchmark-anchor">
            <main id="scene" aria-label="Rendered performance scene"></main>
        </div>
    </div>
    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);

            function getNumber(name, fallback, min, max) {
                const raw = params.get(name);
                const parsed = raw == null ? fallback : Number(raw);
                if (!Number.isFinite(parsed)) {
                    return fallback;
                }
                return Math.max(min, Math.min(max, parsed));
            }

            const groups = getNumber('groups', 28, 4, 120);
            const itemsPerGroup = getNumber('items', 30, 4, 120);
            const depth = getNumber('depth', 4, 2, 8);
            const scene = document.getElementById('scene');
            const fragment = document.createDocumentFragment();

            for (let groupIndex = 0; groupIndex < groups; groupIndex += 1) {
                const cluster = document.createElement('section');
                cluster.className = 'cluster';
                cluster.style.transform = `translate(${(groupIndex % 4) * 3 - 4}px, ${(groupIndex % 5) * 2 - 4}px) rotate(${(groupIndex % 7) - 3}deg)`;

                const heading = document.createElement('h2');
                heading.className = 'cluster-heading';
                heading.textContent = `Cluster ${String(groupIndex + 1).padStart(2, '0')}`;
                cluster.appendChild(heading);

                let currentLayer = cluster;
                for (let depthIndex = 0; depthIndex < depth; depthIndex += 1) {
                    const layer = document.createElement('div');
                    layer.className = 'layer';
                    layer.style.padding = `${10 + depthIndex * 2}px`;
                    layer.style.transform = `translate(${((groupIndex + depthIndex) % 5) - 2}px, ${(depthIndex % 4) - 1}px) rotate(${((groupIndex * 2 + depthIndex) % 9) - 4}deg) scale(${1 + ((groupIndex + depthIndex) % 3) * 0.015}) skew(${(depthIndex % 3) - 1}deg, ${((groupIndex + depthIndex) % 4) - 1}deg)`;
                    currentLayer.appendChild(layer);
                    currentLayer = layer;
                }

                const stack = document.createElement('div');
                stack.className = 'stack';
                currentLayer.appendChild(stack);

                for (let itemIndex = 0; itemIndex < itemsPerGroup; itemIndex += 1) {
                    const tile = document.createElement('article');
                    tile.className = 'tile';
                    tile.style.transform = `translate(${(itemIndex % 5) - 2}px, ${(itemIndex % 7) - 3}px) rotate(${((groupIndex + itemIndex) % 11) - 5}deg)`;

                    const frame = document.createElement('div');
                    frame.className = 'tile-frame';
                    frame.style.transform = `translate(${(itemIndex % 3) - 1}px, ${((groupIndex + itemIndex) % 4) - 2}px) scale(${1 + (itemIndex % 4) * 0.02})`;

                    const target = document.createElement('div');
                    target.className = 'target';
                    target.dataset.benchTarget = '';
                    target.style.transform = `translate(${((groupIndex + itemIndex) % 6) - 3}px, ${(itemIndex % 5) - 2}px) rotate(${((groupIndex * 3 + itemIndex) % 13) - 6}deg) scale(${1 + ((groupIndex + itemIndex) % 5) * 0.012})`;

                    const label = document.createElement('span');
                    label.className = 'target-label';
                    label.style.transform = `skew(${((groupIndex + itemIndex) % 5) - 2}deg, ${(groupIndex % 3) - 1}deg)`;
                    label.textContent = `G${groupIndex + 1} I${itemIndex + 1}`;

                    const badge = document.createElement('span');
                    badge.className = 'target-badge';
                    badge.style.transform = `rotate(${(itemIndex % 9) - 4}deg)`;
                    badge.textContent = String((groupIndex + itemIndex) % 97).padStart(2, '0');

                    target.append(label, badge);
                    frame.appendChild(target);
                    tile.appendChild(frame);
                    stack.appendChild(tile);
                }

                fragment.appendChild(cluster);
            }

            scene.appendChild(fragment);

            document.body.dataset.benchReady = 'true';
            document.body.dataset.groups = String(groups);
            document.body.dataset.itemsPerGroup = String(itemsPerGroup);
            document.body.dataset.depth = String(depth);
            document.body.dataset.targetCount = String(scene.querySelectorAll('[data-bench-target]').length);
        })();
    </script>
</body>
</html>
